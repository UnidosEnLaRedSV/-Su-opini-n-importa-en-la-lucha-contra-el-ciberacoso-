<script>
    // ============================================================
    // 1. MÚSICA DE FONDO - musica_relajante.mp3
    // ============================================================
    const bgMusic = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicToggle');
    const musicIcon = document.getElementById('musicIcon');
    let musicPlaying = false;
    let musicStarted = false;
    
    // Configurar volumen
    bgMusic.volume = 0.4;
    
    // Función para iniciar la música
    function startMusic() {
        if (!musicStarted) {
            bgMusic.play().then(() => {
                musicPlaying = true;
                musicStarted = true;
                musicBtn.classList.add('playing');
                musicIcon.textContent = '🔊';
                console.log('✅ Música iniciada: musica_relajante.mp3');
            }).catch(err => {
                console.log('⏳ Esperando interacción del usuario...');
            });
        }
    }
    
    // Función para alternar música
    function toggleMusic(e) {
        if (e) e.stopPropagation();
        
        if (!musicStarted) {
            startMusic();
            return;
        }
        
        if (musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
            musicBtn.classList.remove('playing');
            musicIcon.textContent = '🔇';
            console.log('⏸️ Música pausada');
        } else {
            bgMusic.play().then(() => {
                musicPlaying = true;
                musicBtn.classList.add('playing');
                musicIcon.textContent = '🔊';
                console.log('▶️ Música reproduciéndose');
            }).catch(err => {
                console.error('❌ Error al reproducir:', err);
            });
        }
    }
    
    // Eventos del elemento de audio
    bgMusic.addEventListener('play', () => {
        musicPlaying = true;
        musicBtn.classList.add('playing');
        musicIcon.textContent = '🔊';
    });
    
    bgMusic.addEventListener('pause', () => {
        musicPlaying = false;
        musicBtn.classList.remove('playing');
        musicIcon.textContent = '🔇';
    });
    
    bgMusic.addEventListener('error', (e) => {
        console.error('❌ Error al cargar musica_relajante.mp3:', e);

    // Click en el botón de música

    // Activar música con el primer clic en cualquier parte de la página

    // ============================================================
    // 2. GROQ API
    // ============================================================
    const GROQ_API_KEY = "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";
    const GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions";
    const GROQ_MODEL = "llama-3.1-8b-instant";
    
    let currentOptionContext = "";
    
    async function callGroqAPI(userOpinion, contextType) {
        const prompt = `Eres una persona empática, cálida y muy humana que apoya a personas que han leído un mensaje sobre ciberacoso y reflexión personal. El usuario acaba de leer un mensaje que aborda este tema: "${contextType}". Luego escribió la siguiente opinión o sentimiento: "${userOpinion}". Responde de manera muy empática, breve (máximo 3 oraciones), reconfortante, con consejos prácticos y amables. Usa un tono cálido como de un amigo cercano que realmente se preocupa. Incluye emojis sutiles. No uses negatividad. Sé auténtico y cercano. No digas que eres una IA, solo responde como una persona que se preocupa.`;
        
        try {
            const response = await fetch(GROQ_API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: GROQ_MODEL,
                    messages: [
                        { role: "system", content: "Eres un asistente empático y cálido que responde como un amigo cercano." },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.75,
                    max_tokens: 200
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                console.error("Error Groq API:", errorData);
                
                if (response.status === 429) {
                    return "💜 La comunidad de apoyo está teniendo mucha actividad en este momento. Dame un respiro de 30 segundos y vuelve a intentarlo. ¡Tu opinión es muy importante! 🌟";
                }
                return `💜 Lo siento, en este momento no puedo procesar tu mensaje. Por favor, inténtalo de nuevo más tarde. 🌟`;
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (error) {
            console.error("Error de conexión:", error);
            return "💜 Gracias por compartir tu sentir. Tu voz es importante. Recuerda que cada pequeño paso hacia la reflexión es un acto de valentía. No estás solo/a en este camino. 🌟";
        }
    }
    
    // ============================================================
    // 3. SONIDO DE TECLADO
    // ============================================================
    let audioCtx = null;
    let keystrokeGain = null;
    
    function initKeystrokeAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        keystrokeGain = audioCtx.createGain();
        keystrokeGain.gain.value = 0.22;
        keystrokeGain.connect(audioCtx.destination);
    }
    
    function playSoftKeystroke() {
        if (!audioCtx) initKeystrokeAudio();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => actuallyPlayKeystroke()).catch(e => console.log);
        } else {
            actuallyPlayKeystroke();
        }
    }
    
    function actuallyPlayKeystroke() {
        if (!audioCtx || !keystrokeGain) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gainNode.gain.value = 0.12;
        osc.connect(gainNode);
        gainNode.connect(keystrokeGain);
        osc.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.stop(audioCtx.currentTime + 0.1);
    }

    const typewriterDiv = document.getElementById('typewriterText');
    const backBtn = document.getElementById('backToCalmBtn');
    const heroTitleEl = document.getElementById('heroTitle');
    const heroSubtitleEl = document.getElementById('heroSubtitle');
    const opinionSection = document.getElementById('opinionSection');
    const opinionInput = document.getElementById('opinionInput');
    const sendOpinionBtn = document.getElementById('sendOpinionBtn');
    const aiResponseDiv = document.getElementById('aiResponse');
    const aiResponseText = document.getElementById('aiResponseText');
    
    // ============================================================
    // 5. TYPWRITER
    // ============================================================
    let typeTimeout = null;
    
    function stopTypewriter() {
        if (typeTimeout) {
            clearTimeout(typeTimeout);
            typeTimeout = null;
        }
    }
    
    function startTypewriterWithSound(element, text, speed = 42, onComplete) {
        stopTypewriter();
        element.innerHTML = '';
        let index = 0;
        
        function writeLetter() {
            if (index < text.length) {
                element.textContent += text.charAt(index);
                playSoftKeystroke();
                index++;
                typeTimeout = setTimeout(writeLetter, speed);
            } else {
                typeTimeout = null;
                if (onComplete) onComplete();
            }
        }
        writeLetter();
    }
    
    function setImageFade(imgElement, newSrc) {
        if (!imgElement) return;
        imgElement.style.transition = 'opacity 0.35s';
        imgElement.style.opacity = '0';
        setTimeout(() => {
            imgElement.src = newSrc;
            imgElement.onload = () => imgElement.style.opacity = '1';
            if (imgElement.complete) imgElement.style.opacity = '1';
        }, 150);
    }
    
    // ============================================================
    // 6. OPINIÓN
    // ============================================================
    let isWaitingForResponse = false;
    
    async function handleSendOpinion() {
        if (isWaitingForResponse) return;
        const opinion = opinionInput.value.trim();
        if (!opinion) {
            alert("💙 Por favor, escribe tu opinión o cómo te sientes antes de enviar.");
            return;
        }
        
        isWaitingForResponse = true;
        sendOpinionBtn.disabled = true;
        sendOpinionBtn.innerHTML = "⏳ Escribiendo respuesta personalizada...";
        
        aiResponseDiv.style.display = "block";
        aiResponseText.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        
        const response = await callGroqAPI(opinion, currentOptionContext);
        aiResponseText.innerHTML = '';
        startTypewriterWithSound(aiResponseText, response, 35);
        
        sendOpinionBtn.disabled = false;
        sendOpinionBtn.innerHTML = "✨ Enviar reflexión ✨";
        isWaitingForResponse = false;
    }
    
    sendOpinionBtn.addEventListener('click', handleSendOpinion);
    
    // ============================================================
    // 7. NAVEGACIÓN
    // ============================================================
    function rebuildMenuWithAnimation() {
        menuContainer.innerHTML = '';
        optionsData.forEach((opt, idx) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = `cardFadeInUp 0.5s forwards ${idx * 0.05 + 0.05}s`;
            card.innerHTML = `
                <span class="option-emoji">${opt.emoji}</span>
                <div class="option-title">${opt.title}</div>
                <div class="option-purpose">${opt.purpose}</div>
            `;
            card.addEventListener('click', () => showNarrative(opt));
            menuContainer.appendChild(card);
        });
    }
    
    function resetToMenu() {
        if (menuContainer.style.display !== 'none') return;
        narrativeArea.style.display = 'none';
        menuContainer.style.display = 'grid';
        stopTypewriter();
        typewriterDiv.innerHTML = '';
        opinionSection.style.display = 'none';
        aiResponseDiv.style.display = 'none';
        opinionInput.value = '';
        aiResponseText.innerHTML = '';
        rebuildMenuWithAnimation();
    }
    
    function showNarrative(option) {
        stopTypewriter();
        if (menuContainer.style.display !== 'none') {
            menuContainer.style.display = 'none';
        }
        narrativeArea.style.display = 'block';
        opinionSection.style.display = 'none';
        aiResponseDiv.style.display = 'none';
        opinionInput.value = '';
        aiResponseText.innerHTML = '';
        currentOptionContext = option.context;
        
        setImageFade(dynamicImg, option.image);
        
        startTypewriterWithSound(typewriterDiv, option.message, 40, () => {
            opinionSection.style.display = 'block';
        });
        
        narrativeArea.style.animation = 'none';
        narrativeArea.offsetHeight;
        narrativeArea.style.animation = 'fadeScale 0.4s ease';
    }
    
    // ============================================================
    // 8. ANIMACIÓN HERO
    // ============================================================
    let heroAnimationDone = false;
    
    function typeWriterHero(element, text, speed = 45, callback) {
        let i = 0;
        element.innerHTML = '';
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'hero-cursor';
                cursorSpan.textContent = '|';
                element.appendChild(cursorSpan);
                if (callback) callback();
            }
        }
        type();
    }
    
    function animateHero() {
        if (heroAnimationDone) return;
        heroAnimationDone = true;
        const fullTitle = "✨ Tu opinión importa en la lucha contra el ciberacoso ✨";
        const fullSub = "Un espacio diseñado para transformar el ruido digital en empatía. Elige un camino para reconectar con tu valor.";
        typeWriterHero(heroTitleEl, fullTitle, 45, () => {
            typeWriterHero(heroSubtitleEl, fullSub, 38);
        });
    }
    
    // ============================================================
    // 9. INIT
    // ============================================================
    function preloadImages() {
        optionsData.forEach(opt => {
            const img = new Image();
            img.src = opt.image;
        });
    }
    
    function init() {
        rebuildMenuWithAnimation();
        narrativeArea.style.display = 'none';
        menuContainer.style.display = 'grid';
        typewriterDiv.innerHTML = '';
        dynamicImg.src = "https://images.pexels.com/photos/6646872/pexels-photo-6646872.jpeg?auto=compress&cs=tinysrgb&w=800&h=500&fit=crop";
        preloadImages();
        animateHero();
        initKeystrokeAudio();
    }
    
    backBtn.addEventListener('click', resetToMenu);
    init();
</script>
</body>
</html>
